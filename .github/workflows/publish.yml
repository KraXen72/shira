name: publish

on:
    # Workflow will run when a release has been published
    release:
        types:
            - published

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write # required for OIDC trusted publishing

        steps:
            - uses: actions/checkout@v4

            - name: Set up uv
              uses: astral-sh/setup-uv@v5

            - name: Build package
              run: uv build

            - name: Publish to PyPI
              run: uv publish
